# Prod stack: realtime-ai (STT+TTS+WebRTC) + vLLM (LLM), sharing one GPU.
# Requires the NVIDIA Container Toolkit on the host.
#
# WebRTC media needs UDP reachability -> network_mode: host (Linux, public IP).
# Both services share the GPU, so vLLM's VRAM is capped to leave room for
# faster-whisper + Kokoro.
services:
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model Qwen/Qwen3-8B-AWQ
      --gpu-memory-utilization 0.60
      --max-model-len 16384
      --kv-cache-dtype fp8
      --max-cudagraph-capture-size 16
      --enable-prefix-caching
      --port ${VLLM_PORT:-18000}
    volumes:
      - hf-cache:/root/.cache/huggingface     # persist LLM weights
    ports:
      - "${VLLM_PORT:-18000}:${VLLM_PORT:-18000}"
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

  realtime-ai:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    network_mode: host          # required for WebRTC UDP media
    environment:
      - PORT=${REALTIME_PORT:-18080}
      - LLM_BASE_URL=http://localhost:${VLLM_PORT:-18000}/v1
      - LLM_MODEL=Qwen/Qwen3-8B-AWQ
      - "LLM_SYSTEM_PREFIX=/no_think "
      - LLM_TEMPERATURE=0.3
      - LLM_MAX_TOKENS=150
      - STT_BACKEND=faster_whisper
      - STT_MODEL_CUDA=Systran/faster-distil-whisper-large-v3
      - STT_COMPUTE_TYPE=int8
      - TTS_BACKEND=kokoro
      - MAX_CONCURRENT_SESSIONS=16
      - CF_TURN_KEY_ID=${CF_TURN_KEY_ID:-}
      - CF_TURN_API_TOKEN=${CF_TURN_API_TOKEN:-}
      - CF_TURN_TTL_SECONDS=${CF_TURN_TTL_SECONDS:-86400}
    volumes:
      - hf-cache:/app/.cache/huggingface       # faster-whisper + silero weights
    restart: unless-stopped
    depends_on:
      - vllm
    deploy:
      resources:
        reservations:
          devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]

volumes:
  hf-cache:
